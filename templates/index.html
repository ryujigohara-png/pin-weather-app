<!DOCTYPE html>
<html lang="{{ session.get('lang', 'ja') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ lang_dict['⛵Pin_Weather!'] }}</title>
    <style>
        /* ====================================================================================== */
        /* 基本スタイル定義 */
        /* ====================================================================================== */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f2f5; color: #31333f; overflow-x: hidden; }
        .header { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e6e9ef; position: sticky; top: 0; z-index: 100; }
        .btn-settings { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; }
        
        /* ====================================================================================== */
        /* 101. レスポンシブ・ナビゲーション (縦画面2段 / 横画面1段) */
        /* ====================================================================================== */
        .nav-section {
            padding: 10px;
            display: flex;
            flex-wrap: wrap; 
            gap: 8px;
            background: white;
            border-bottom: 1px solid #e6e9ef;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fb;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            color: #31333f;
            text-decoration: none;
            transition: background 0.2s;
        }
        /* スマホ縦画面：地点選択を1行、残り3つを次の1行に */
        .btn-select-place {
            flex: 1 1 100%; 
            background: #ffffff;
            border: 2px solid #0078ff;
            color: #0078ff;
        }
        .btn-sub {
            flex: 1;
            min-width: 0;
            font-size: 13px;
        }
        /* PC・スマホ横画面：全てを1行に並べる */
        @media (min-width: 600px) {
            .nav-section { flex-wrap: nowrap; }
            .btn-select-place { flex: 2; }
            .btn-sub { flex: 1; font-size: 14px; }
        }

        /* ====================================================================================== */
        /* 詳細設定モーダル (サイドメニュー) */
        /* ====================================================================================== */
        #settings-modal {
            display: none; position: fixed; top: 0; right: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
        }
        .modal-content {
            position: absolute; top: 0; right: 0; width: 85%; max-width: 320px; height: 100%;
            background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .modal-header { padding: 15px; border-bottom: 1px solid #e6e9ef; display: flex; align-items: center; justify-content: space-between; background: #f8f9fb; }
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; }
        
        .menu-item { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; 
            border: 1px solid #dcdcdc; background: #fff; text-align: left; 
            font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }
        .menu-item-primary { background: #0078ff; color: white; border: none; font-weight: bold; }

        .setting-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .setting-label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }

        /* ====================================================================================== */
        /* ローディング表示 */
        /* ====================================================================================== */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #0078ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: bold; color: #31333f;">{{ lang_dict['MSG_GEN_GRAPH'] }}</div>
    </div>

    <div class="header">
        <div style="font-weight: bold; font-size: 1.1rem;">{{ lang_dict['⛵Pin_Weather!'] }}</div>
        <button class="btn-settings" onclick="toggleSettings()">⚙️</button>
    </div>

    <div class="nav-section">
        <button class="nav-btn btn-select-place" onclick="togglePlaceSelector()">
            {{ lang_dict['SELECT_PLACE'] }}
        </button>
        <button class="nav-btn btn-sub" onclick="getCurrentLocation()">
            {{ lang_dict['BTN_CURRENT_LOC_SHORT'] }}
        </button>
        <button class="nav-btn btn-sub" onclick="searchCity()">
            {{ lang_dict['BTN_SEARCH_CITY'] }}
        </button>
        <button class="nav-btn btn-sub" onclick="location.href='/map_selection'">
            {{ lang_dict['BTN_MAP'] }}
        </button>
    </div>

    <div id="place-selector" style="display:none; background:white; padding:10px; border-bottom:1px solid #ddd;">
        {% for spot in user_locations %}
        <button class="menu-item" onclick="location.href='/update_by_idx/{{ loop.index0 }}'">
            {{ spot.name }}
        </button>
        {% endfor %}
    </div>

    <div id="main-view" style="padding:10px; text-align:center;">
        {% if graph_url %}
            <img src="{{ graph_url }}" alt="Weather Graph" style="max-width:100%; height:auto; border-radius:8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        {% else %}
            <p style="color:#888; margin-top:50px;">{{ lang_dict['SELECT_PLACE'] }}</p>
        {% endif %}
    </div>

    <div id="settings-modal" onclick="toggleSettings()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span style="font-weight: bold;">{{ lang_dict['⚙ 詳細設定'] }}</span>
                <button onclick="toggleSettings()" style="background:none; border:none; font-size:24px;">×</button>
            </div>
            
            <div class="modal-body">
                <button class="menu-item menu-item-primary" onclick="location.href='/edit_spots'">
                    <span>{{ lang_dict['📍 My Spots 編集'] }}</span>
                </button>

                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

                <form action="/update_settings" method="POST" id="settings-form">
                    <div class="setting-group">
                        <label class="setting-label">{{ lang_dict['グラフ表示設定の詳細'] }}</label>
                        <label><input type="checkbox" name="show_wind" {% if design_params.show_wind %}checked{% endif %}> {{ lang_dict['風向・風速グラフ表示'] }}</label><br>
                        <label><input type="checkbox" name="show_temp" {% if design_params.show_temp %}checked{% endif %}> {{ lang_dict['気温グラフ表示'] }}</label><br>
                        <label><input type="checkbox" name="show_tide" {% if design_params.show_tide %}checked{% endif %}> {{ lang_dict['潮位グラフ表示'] }}</label>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top:20px;">
                        <button type="submit" class="menu-item menu-item-primary" style="justify-content: center; flex: 2;">
                            {{ lang_dict['更新'] }}
                        </button>
                        <button type="button" class="menu-item" style="justify-content: center; flex: 1;" onclick="location.href='/reset_settings'">
                            {{ lang_dict['リセット'] }}
                        </button>
                    </div>
                </form>

                <div style="margin-top: 20px;">
                    <button class="menu-item" onclick="location.href='/set_lang/ja'">🇯🇵 日本語</button>
                    <button class="menu-item" onclick="location.href='/set_lang/en'">🇺🇸 English</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        function togglePlaceSelector() {
            const ps = document.getElementById('place-selector');
            ps.style.display = (ps.style.display === 'block') ? 'none' : 'block';
        }

        function showLoading() {
            document.getElementById('loading-overlay').style.display = 'flex';
        }

        function getCurrentLocation() {
            showLoading();
            // GPS取得ロジックへのリダイレクト等
            location.href = "/current_location";
        }

        function searchCity() {
            // 地名検索（地図画面の検索モード起動など）
            location.href = "/map_selection?search=1";
        }

        document.getElementById('settings-form').onsubmit = showLoading;
    </script>
</body>
</html>
